# NEXUS — Build e push de imagens Docker para GHCR
#
# Imagens publicadas:
#   ghcr.io/sergioworkprt-ui/nexus-core:latest
#   ghcr.io/sergioworkprt-ui/nexus-dashboard:latest
#
# Trigger: push ao branch de desenvolvimento OU execucao manual
# Auth: usa GITHUB_TOKEN automatico (sem secrets adicionais)

name: Docker — Build & Push GHCR

on:
  push:
    branches:
      - claude/create-test-file-d1AY6
      - main
    paths:
      - 'nexus/**'
      - 'nexus/docker/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to GHCR'
        required: false
        default: 'true'
        type: boolean

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # ── nexus-core ─────────────────────────────────────────────────────────────
  build-core:
    name: nexus-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (nexus-core)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER }}/nexus-core
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push nexus-core
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexus/docker/Dockerfile.core
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── nexus-dashboard ────────────────────────────────────────────────────────
  build-dashboard:
    name: nexus-dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (nexus-dashboard)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER }}/nexus-dashboard
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push nexus-dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nexus/docker/Dockerfile.dashboard
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # VITE_API_URL/WS_URL: usa localhost (proxy interno do dashboard server)
          # Para IPs especificos: adiciona --build-arg no docker build local
          build-args: |
            VITE_API_URL=http://localhost:9000/api
            VITE_WS_URL=ws://localhost:9000/ws
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Sumario ────────────────────────────────────────────────────────────────
  summary:
    name: Sumario
    runs-on: ubuntu-latest
    needs: [build-core, build-dashboard]
    if: always()
    steps:
      - name: Resultado
        run: |
          echo '## Docker Build Summary' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Imagem | Resultado |' >> $GITHUB_STEP_SUMMARY
          echo '|--------|-----------|' >> $GITHUB_STEP_SUMMARY
          echo "| ghcr.io/${{ env.OWNER }}/nexus-core:latest | ${{ needs.build-core.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ghcr.io/${{ env.OWNER }}/nexus-dashboard:latest | ${{ needs.build-dashboard.result }} |" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '### Pull' >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ env.OWNER }}/nexus-core:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ env.OWNER }}/nexus-dashboard:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
