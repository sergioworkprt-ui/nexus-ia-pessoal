# IB Gateway configuration
# Place this file in: /opt/ibgateway/jts.ini
# (or ~/.IBC/jts.ini depending on your install)

[IBGateway]
ApiPort=7497
PaperApiPort=7497
EnableAPI=true
ReadOnlyLogin=false
BypassOrderPrecautions=true
DownloadOpenOrders=true
AutoLogoffTime=00:00
ReconnectAutomatic=true
ExistingSessionDetectedAction=secondary
